# lastshot の CI。GitHub は「リポジトリ直下の .github/workflows/」しか実行しないため、
# monorepo（eikodan）では lastshot/.github/ ではなくここに置く（lastshot/** だけを対象に path フィルタ）。
#
# 何をするか（ローカルの ./run と同じことを Linux ネイティブで一気通し）:
#   build(release) → CSSゲート(Tailwind purge + semgrep) → 起動 → HTTP黒箱(test-http) → ブラウザE2E
# DB は GitHub の postgres サービス（TCP）。dev機向け最適化（sccache/mold/-Zthreads）は
# 追加ツール無しの素ビルドにするため env で無効化（実測確認済み: RUSTFLAGS="" が .cargo/config.toml の
# target rustflags を置換、CARGO_BUILD_RUSTC_WRAPPER="" が sccache を無効化）。
#
# 注: compose分割 vs 全部入りsingle の「CI環境比較」は最終形態の計測フェーズに保留中（container-ops.md）。
#     ここではまず「ネイティブで緑になる CI」を1本通す。
name: lastshot CI

on:
  push:
    branches: [main]
    paths:
      - "lastshot/**"
      - ".github/workflows/lastshot-ci.yml"
  pull_request:
    paths:
      - "lastshot/**"
      - ".github/workflows/lastshot-ci.yml"

# 同一参照の古い実行はキャンセルして CI 時間を節約。
concurrency:
  group: lastshot-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # ローカル(Apple Silicon=aarch64)・arm64 Docker とアーキ一致させるため ARM runner。
    # パブリックリポジトリなので ARM runner は無料。計測上 Rust ビルドは ~14% 速いが
    # CI 総時間は x86 とほぼ互角(大半が arch 非依存の DL/セットアップのため)。
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: lastshot
    services:
      postgres:
        # alpine(musl)で軽量・pull が ~3s 速い(実機ベンチ 13s→10s)。用途は素のSQLのみ。
        image: postgres:17-alpine
        env:
          POSTGRES_USER: lastshot
          POSTGRES_PASSWORD: lastshot
          POSTGRES_DB: lastshot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lastshot -d lastshot"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    env:
      # 本番/CI は TCP（compose 同一網と同じ接続作法）。
      DATABASE_URL: postgres://lastshot:lastshot@localhost:5432/lastshot
      # worktree 自動分離（PORT/PGDATABASE/BASE_URL）を CI では本流相当（スロット0）に固定。
      # ./run はこれらを ${VAR:-…} で尊重するので、チェックアウト先ディレクトリ名に依存せず
      # 3000 / lastshot で動く（postgres サービス・Start app・tests-http/browser の接続先が揃う）。
      PORT: "3000"
      PGDATABASE: lastshot
      BASE_URL: http://127.0.0.1:3000
      # dev機向け最適化を無効化（素ビルド）。
      RUSTFLAGS: ""
      CARGO_BUILD_RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc + semgrep
        run: |
          # apt-get update(~12-17s)は省略し、ランナー同梱の index で直接 install(~8s)。
          # 稀に index が古く失敗する時だけ update→retry で自己回復(ARM実機ベンチで fast-path 確認済)。
          # migrations は Flyway(docker image)で適用するので psql クライアントは入れない。
          pkgs="protobuf-compiler"
          sudo apt-get install -y --no-install-recommends $pkgs \
            || { sudo apt-get update && sudo apt-get install -y --no-install-recommends $pkgs; }
          # semgrep は uv で入れる。実機ベンチ(ARM)で pipx ~16s に対し uv は ~2s だった。
          # 速さの正体は wheel DL ではなく venv 展開で、pipx はそこが遅い(= pip cache では
          # 縮まない/実測 cold17s→warm16s)。uv(Rust製・並列・hardlink)は素で速く、キャッシュ不要。
          # semgrep の scan は --config assets/semgrep のローカルルールなので実行時 DL も無い。
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv tool install semgrep==1.166.0

      # rustup toolchain のキャッシュは実機で逆効果(保存48s ≫ 復元4s、巨大 toolchain が
      # 10GB枠で本命 rust-cache を圧迫)のため入れない。nightly 導入(~7s)は素で実行する。
      - name: Install Rust nightly (rust-toolchain.toml に合わせる)
        run: rustup toolchain install nightly --component rust-src --profile minimal

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            lastshot
            lastshot/tests-http

      - name: Apply migrations (Flyway / docker image = ./run と同じ)
        # postgres は service コンテナ。--network=host で runner の localhost:5432 へ繋ぐ。
        # PGDATABASE は job env で本流相当(lastshot)にピン済み。
        env:
          FLYWAY_NETWORK: host
          FLYWAY_URL: jdbc:postgresql://localhost:5432/lastshot
          FLYWAY_USER: lastshot
          FLYWAY_PASSWORD: lastshot
        run: ./run -q db-migrate

      - name: Build app (release)
        run: cargo build --release -p app

      - name: CSS gate (Tailwind purge build + semgrep)
        run: |
          ./run -q css-setup
          ./run -q css-check

      - name: Start app
        run: |
          HOST=127.0.0.1 PORT=3000 nohup ./target/release/app > /tmp/app.log 2>&1 &
          echo $! > /tmp/app.pid

      - name: Wait for app
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3000/ >/dev/null; then
              echo "app is up after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "app did not start:"; cat /tmp/app.log; exit 1

      - name: HTTP black-box tests (tests-http)
        run: ./run -q test-http

      # Playwright Chromium(~120MB) と npm deps をキャッシュ。ARM 実機ベンチで browser-setup が
      # 21s→6s + restore 5s = 正味 ~10s 短縮、保存(Post)はキー命中時 0s(payload 小で rust-cache の
      # 10GB枠も圧迫しない)。本命の効果は「Chromium DL のネットワーク変動(時々30-40sに跳ねる)」を
      # 消して CI 総時間のブレを縮めること。キーは package-lock の hash 連動で playwright 更新時に自動失効。
      - name: Cache Playwright browser + npm deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
            lastshot/browser/node_modules
          key: playwright-${{ runner.arch }}-${{ hashFiles('lastshot/browser/package-lock.json') }}

      - name: Browser E2E (Playwright)
        run: |
          ./run -q browser-setup
          ./run -q browser

      - name: Stop app
        if: always()
        run: kill "$(cat /tmp/app.pid)" 2>/dev/null || true
