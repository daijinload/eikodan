# bacon: 保存のたびに check / 再起動を回す開発ループ。
# 使い方:
#   bacon            # デフォルト(check)。型エラーが即返る
#   bacon clippy
#   bacon run        # サーバーを起動し、変更で再起動（ソケットは切れる）
#   bacon serve      # systemfd でソケットを引き継ぎ再起動（要 `cargo install systemfd`）
#
# テンプレ/CSS/HTMX属性の変更はサーバー再起動すら不要（minijinja-autoreload + tower-livereload）。

default_job = "check"

[jobs.check]
command = ["cargo", "check", "--all-targets", "--color", "always"]
need_stdout = false

[jobs.clippy]
command = ["cargo", "clippy", "--all-targets", "--color", "always"]
need_stdout = false

[jobs.run]
command = ["cargo", "run", "-p", "app", "--color", "always"]
need_stdout = true
background = false
on_change_strategy = "kill_then_restart"

# ソケットを引き継いで再起動（接続が切れない）。要 systemfd。
[jobs.serve]
command = ["systemfd", "--no-pid", "-s", "http::3000", "--", "cargo", "run", "-p", "app"]
need_stdout = true
background = false
on_change_strategy = "kill_then_restart"
