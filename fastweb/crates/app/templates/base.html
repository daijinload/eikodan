<!doctype html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- CSSは2モード。実行時グローバル css_built で切替（コンパイルプロファイルには紐付けない＝debug/release往復で再ビルドしない）。
       ・日常開発(既定): CDNのブラウザJIT。ビルドもwatchも不要で摩擦ゼロ。
       ・最終確認/本番: CLIでパージ生成した /static/app.css。`CSS=built` で起動、release は常にこちら。
       CDNはDOMから何でも生成するため「devで動くが本番パージで崩れる」クラスを見逃す。その検査は
       コミット/push前のクリーンビルド＋semgrep（assets/check-css.sh）に集約する。詳細は README「CSS」。 -->
  {% if css_built %}
  <link rel="stylesheet" href="/static/app.css" />
  {% else %}
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  {% endif %}
  <!-- HTMXはJSライブラリ（CSSパージ非対象）なのでCDNのまま固定 -->
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"
          integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V"
          crossorigin="anonymous"></script>
  <title>{% block title %}fastweb{% endblock %}</title>
</head>
<body class="p-6 bg-base-200 min-h-screen">
  <div class="max-w-3xl mx-auto">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
